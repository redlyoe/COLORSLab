name: Lint, Test and Deploy to DigitalOcean
on:
  push:
    branches:
      - main
      - assignment-5-test
      - github-actions
  workflow_dispatch:

jobs:
  lint:
    name: Lint HTML, PHP & JS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Lint PHP files
        run: find . -name "*.php" -exec php -l {} \;
      - name: Install HTMLHint
        run: npm install -g htmlhint
      - name: Lint HTML files
        run: find . -name "*.html" -exec htmlhint {} \;
      - name: Install ESLint
        run: npm install -g eslint
      - name: Lint JS files
        run: find . -name "*.js" -exec eslint {} \;

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Jest
        run: npm install jest --save-dev
      - name: Run tests
        run: npx jest tests/

  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        run: echo "No real deploy, since no DigitalOcean droplet available"
