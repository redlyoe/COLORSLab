name: Lint and Deploy to DigitalOcean

on:
  push:
    branches: [main]

jobs:
  lint:
    name: Lint HTML & PHP
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Lint PHP files
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Lint PHP files
        run: find . -name "*.php" -exec php -l {} \;

      # Lint HTML files
      - name: Install HTMLHint
        run: npm install -g htmlhint

      - name: Lint HTML files
        run: find . -name "*.html" -exec htmlhint {} \;

  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

