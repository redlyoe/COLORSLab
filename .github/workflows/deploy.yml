name: Lint and Deploy to DigitalOcean

on:
  push:
    branches:
      - main
      - github-actions
  workflow_dispatch:

jobs:
  lint:
    name: Lint HTML, PHP & JS
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Set up PHP
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      # Lint PHP files
      - name: Lint PHP files
        run: find . -name "*.php" -exec php -l {} \;

      # Lint HTML files
      - name: Install HTMLHint
        run: npm install -g htmlhint

      - name: Lint HTML files
        run: find . -name "*.html" -exec htmlhint {} \;

      # Lint JS files
      - name: Install ESLint
        run: npm install -g eslint

      - name: Lint JS files
        run: find . -name "*.js" -exec eslint {} \;

  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

